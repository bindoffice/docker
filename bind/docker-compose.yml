version: '3'

services:
  crdb:
    image: ${DOCKER_REGISTRY}bindoffice/cockroach:v23.2
    restart: always
    command: start-single-node --insecure --listen-addr=${CRDB_ADDR} --http-addr=${CRDB_WEB_ADDR}
    volumes:
     - ./crdb/data:/cockroach/cockroach-data
    network_mode: "host"

  crdb-init:
    image: ${DOCKER_REGISTRY}bindoffice/cockroach:v23.2
    restart: on-failure:5
    volumes:
      - ./crdb/setup_db.sh:/setup_db.sh
    entrypoint: "/bin/bash"
    command: /setup_db.sh
    network_mode: "host"
    depends_on:
     - crdb

  minio:
    image: ${DOCKER_REGISTRY}bindoffice/minio:RELEASE.2024-06-11T03-13-30Z
    restart: always
    container_name: bind_minio
    command: server /data/www/minio --address ${MINIO_ADDR} --console-address ${MINIO_WEB_ADDR}
    network_mode: "host"
    environment:
      MINIO_ACCESS_KEY: "${MINIO_USER}"
      MINIO_SECRET_KEY: "${MINIO_PASSWORD}"
    logging:
      options:
        max-size: "10M"
        max-file: "10"
      driver: json-file
    volumes:
      - ./minio/data:/data/www/minio
      - ./minio/config:/root/.minio

  nats:
    image: ${DOCKER_REGISTRY}bindoffice/nats:2.9.25
    container_name: bind_nats
    restart: always
    command: -c /etc/nats/nats.conf
    volumes:
      - ./nats/nats.conf:/etc/nats/nats.conf
      - ./nats/data:/data
    network_mode: "host"

  redis:
    image: ${DOCKER_REGISTRY}bindoffice/redis:6.0
    restart: always
    container_name: bind_redis
    volumes:
      - ./redis/data:/data/redis
      - ./redis/logs/redis.log:/data/logs/redis.log
      - ./redis/redis.conf:/etc/redis/redis.conf
    command:
      redis-server /etc/redis/redis.conf
    network_mode: "host"

  
  meet-server:
    image: ${DOCKER_REGISTRY}bindoffice/bind-meetserver:latest
    restart: always
    volumes:
      - ./meetserver/config.yaml:/data/www/bind-meetserver/config.yaml
    working_dir: /data/www/bind-meetserver
    command: ["/data/www/bind-meetserver/bind-meetserver"]
    network_mode: "host"
    environment:
      BIND_SELF_DOMAIN: "${DOMAIN}"
      BIND_MEET_ADDR: "${MEET_ADDR}"
      REDIS_ADDR: "${REDIS_ADDR}"
      REDIS_USER: "${REDIS_USER}"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      BIND_MEET_KEY: "${MEET_KEY}"
      BIND_MEET_SECRET: "${MEET_SECRET}"
    depends_on:
      - redis

  office-api:
    image: ${DOCKER_REGISTRY}bindoffice/bind-office-api:latest
    container_name: bind_office_api       #容器的名称
    command: ["/data/www/bind-office-api/bind-office-api"]
    restart: always
    tty: true
    volumes:
      - ./office-api/logs:/data/www/logs
    network_mode: "host"
    environment:
      BIND_OFFICE_API_ADDR: "${OFFICE_API_ADDR}"
      BIND_SQLDB: "postgresql://root@${CRDB_ADDR}/${DB_NAME}"
      BIND_OSS_PUBLIC_ADDR: "${DOMAIN}"
      BIND_OSS_ADDR: "${MINIO_ADDR}"
      BIND_OSS_ACCESS_KEY: "${MINIO_USER}"
      BIND_OSS_ACCESS_SECRET: "${MINIO_PASSWORD}"
      BIND_OSS_USE_SSL: "${MINIO_USESSL}"
      BIND_OSS_DRIVE_BUCKET_NAME: "drive"
    depends_on:
       - crdb
       - crdb-init
       - minio

  
  search:
    image: ${DOCKER_REGISTRY}bindoffice/bind-search:latest
    container_name: bind_search       #容器的名称
    command: ["/data/www/bind-search/bind-search"]
    restart: always
    tty: true
    volumes:
      - ./search/logs:/data/www/logs
      - ./search/data:/data/www/bind-search/data
    network_mode: "host"
    environment:
      BIND_SEARCH_ADDR: "${SEARCH_ADDR}"
      BIND_TYPESENSE_ADDR: "${TYPESENSE_ADDR}:${TYPESENSE_PORT}"
      BIND_TYPESENSE_KEY: "${TYPESENSE_KEY}"
    depends_on:
       - typesense

  web:
    image: ${DOCKER_REGISTRY}bindoffice/bind-inbox:latest
    command: ["/data/www/bind-inbox/bind-inbox"]
    container_name: inboxserver
    restart: always
    tty: true
    volumes:
      - ./inbox/logs:/data/www/logs
      - ./inbox/certs:/tmp/bind_certs
      #- /etc/ssl/certs/ca-bundle.crt:/etc/ssl/certs/ca-bundle.crt":
      #- /etc/ssl/certs/ca-bundle.trust.crt:/etc/ssl/certs/ca-bundle.trust.crt
      - ./1:/etc/ssl/certs/ca-bundle.crt
      - ./2:/etc/ssl/certs/ca-bundle.trust.crt
    network_mode: "host"
    environment:
      BIND_SELF_DOMAIN: "${DOMAIN}"
      BIND_LICENSE: "${BIND_LICENSE}"
      BIND_ADMIN_EMAIL: "${ADMIN_EMAIL}"
      BIND_ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      BIND_OFFICE_SERVER: "http://${OFFICE_API_ADDR}"
      BIND_CERT_DIR: "${CERT_DIR}"
      BIND_MEET_SERVER: "${MEET_SERVER}"
      BIND_MEET_KEY: "${MEET_KEY}"
      BIND_MEET_SECRET: "${MEET_SECRET}"
      BIND_MEET_AUTH_TYPE: "${MEET_AUTH_TYPE}"
      BIND_MQTT_PUBLIC_ADDR: "${MQTT_PROTOCOL}://${DOMAIN}:${MQTT_PUBLIC_PORT}"
      BIND_MQTT_CLIENT_ID: "${MQTT_ID}"
      BIND_MQTT_ADDR: "${MQTT_IP}:${MQTT_PORT}"
      BIND_FROMUSER: ""
      BIND_SEARCH_SERVER: "http://${SEARCH_ADDR}"
      BIND_SQLDB: "postgresql://root@${CRDB_ADDR}/${DB_NAME}"
      BIND_HTTP_ADDR: "${BINDIP}:40008"
      BIND_ALLOW_ORIGIN: "${ALLOW_ORIGIN}"
      BIND_OSS_PUBLIC_ADDR: "${DOMAIN}"
      BIND_OSS_ADDR: "${MINIO_ADDR}"
      BIND_OSS_ACCESS_KEY: "${MINIO_USER}"
      BIND_OSS_ACCESS_SECRET: "${MINIO_PASSWORD}"
      BIND_OSS_USE_SSL: "${MINIO_USESSL}"
      BIND_OSS_DRIVE_BUCKET_NAME: "${DRIVE_BUCKET}"
      BIND_OSS_MAIL_BUCKET_NAME: "${MAIL_BUCKET}"
      BIND_SESSION_HEDIS_HOST: "${REDIS_ADDR}"
      BIND_SESSION_HEDIS_PASSWORD: ""
      BIND_SESSION_HEDIS_DB: "1"
      BIND_SESSION_HEDIS_POOLSIZE: "10"
      BIND_CACHE_HEDIS_HOST: "${REDIS_ADDR}"
      BIND_CACHE_HEDIS_PASSWORD: ""
      BIND_CACHE_HEDIS_DB: "0"
      BIND_CACHE_HEDIS_POOLSIZE: "20"
      BIND_PUBLIC_DRIVE_PREFIX: "${PUBLIC_DRIVE_PREFIX}"
      BIND_AI_TOKEN: "${AI_TOKEN}"
      BIND_AI_MODEL: "${AI_MODEL}"
      BIND_AI_TYPE: "${AI_TYPE}"
      BIND_NATS_URL: "${NATS_URL}"
      BIND_NATS_CLUSTER_ID: "bind"
      BIND_NATS_TASK_CLIENT_ID: "bind-service-a"
      BIND_NATS_TASK_MAIL_SEND_SUBJECT: "bind-send"
      BIND_NATS_TASK_MAIL_SAVE_SUBJECT: "bind-save"
    depends_on:
      #- db
       - crdb
       - crdb-init
       - redis
       - minio
       - office-api
       - search
       - meet-server
       - mqtt

  typesense:
    image: ${DOCKER_REGISTRY}bindoffice/typesense:28.0
    container_name: typesense
    command: --data-dir /data --api-key=${TYPESENSE_KEY} --api-address=${TYPESENSE_ADDR} --api-port=${TYPESENSE_PORT}
    restart: on-failure
    tty: true
    volumes:
      - ./typesense/data:/data
      - ./typesense/logs:/data/logs
    network_mode: "host"
    environment:
      TYPESENSE_KEY: "${TYPESENSE_KEY}"
      TYPESENSE_ADDR: "${TYPESENSE_ADDR}"
      TYPESENSE_PORT: "${TYPESENSE_PORT}"

  mqtt:
    image: ${DOCKER_REGISTRY}bindoffice/bind-mqtt:latest
    container_name: bind_mqtt
    command: ["/data/www/bind-mqtt/bind-mqtt"]
    restart: always
    tty: true
    volumes:
      - ./mqtt/logs:/data/www/logs
    network_mode: "host"
    environment:
      BIND_MQTT_CLIENT_ID: "${MQTT_ID}"
      BIND_MQTT_ADDR: "${MQTT_IP}:${MQTT_PORT}"
      BIND_SESSION_HEDIS_HOST: "${REDIS_ADDR}"
      BIND_SESSION_HEDIS_PASSWORD: ""
      BIND_SESSION_HEDIS_DB: "1"
      BIND_SESSION_HEDIS_POOLSIZE: "10"
    depends_on:
       - redis

  task:
    image: ${DOCKER_REGISTRY}bindoffice/bind-task:latest
    container_name: bind_task
    command: ["/data/www/bind-task/bind-task"]
    restart: always
    tty: true
    volumes:
      - /etc/ssl/certs/ca-bundle.crt:/etc/ssl/certs/ca-bundle.crt
      - /etc/ssl/certs/ca-bundle.trust.crt:/etc/ssl/certs/ca-bundle.trust.crt
      - ./task/logs:/data/www/logs
    network_mode: "host"
    environment:
      BIND_SQLDB: "postgresql://root@${CRDB_ADDR}/${DB_NAME}"
      BIND_SMTP_ADDRESSES: "${SMTP_ADDR}"
      BIND_SMTP_KEY: "bind-smtp-bucket"
      BIND_LOCAL_SMTP: "${LOCAL_SMTP_DOMAIN}:40025"
      BIND_SEARCH_SERVER: "http://${SEARCH_ADDR}"
      BIND_SESSION_HEDIS_HOST: "${REDIS_ADDR}"
      BIND_SESSION_HEDIS_PASSWORD: ""
      BIND_SESSION_HEDIS_DB: "1"
      BIND_SESSION_HEDIS_POOLSIZE: "10"
      BIND_OSS_PUBLIC_ADDR: "${DOMAIN}"
      BIND_OSS_ADDR: "${MINIO_ADDR}"
      BIND_OSS_ACCESS_KEY: "${MINIO_USER}"
      BIND_OSS_ACCESS_SECRET: "${MINIO_PASSWORD}"
      BIND_OSS_USE_SSL: "${MINIO_USESSL}"
      BIND_OSS_MAIL_BUCKET_NAME: "${MAIL_BUCKET}"
      BIND_OSS_DRIVE_BUCKET_NAME: "${DRIVE_BUCKET}"
      BIND_NATS_URL: "${NATS_URL}"
      BIND_NATS_CLUSTER_ID: "bind"
      BIND_NATS_TASK_CLIENT_ID: "bind-service-a"
      BIND_NATS_TASK_MAIL_SEND_SUBJECT: "bind-send"
      BIND_NATS_TASK_MAIL_SAVE_SUBJECT: "bind-save"
    depends_on:
       - crdb
       - crdb-init
       - redis
       - nats
       - minio
       - search

  smtp:
    image: ${DOCKER_REGISTRY}bindoffice/bind-smtp:latest
    command: ["/data/www/bind-smtp/bind-smtp"]
    restart: always
    tty: true
    volumes:
      - ./smtp/logs:/data/www/logs
      - ./smtp/data:/data/www/bind-smtp/data
      - ./smtp/certs:/tmp/bind_certs
      - ./1:/etc/ssl/certs/ca-bundle.crt
      - ./2:/etc/ssl/certs/ca-bundle.trust.crt
    network_mode: "host"
    environment:
      BIND_SELF_DOMAIN: "${DOMAIN}"
      BIND_SMTP_KEY: "bind-smtp-bucket"
      BIND_SMTP_HOSTNAME: ""
      BIND_SMTP_MAX_DATASIZE: "50"
      BIND_SMTP_DATA_DIR: "/data/www/bind-smtp/data"
      BIND_CERT_DIR: "${CERT_DIR}"
      BIND_SMTP_ADDRESSES: "${SMTP_ADDR}"
      BIND_SMTP_SUBMISSION_ADDRESSES: "systemd"
      BIND_SMTP_SUBMISSION_TLS_ADDRESSES: "${SMTP_TLS_ADDR}"
      BIND_SMTP_MONITOR_ADDRESSES: ""
      BIND_SMTP_MAILLOG_PATH: "/tmp/maillog.log"
      BIND_SQLDB: "postgresql://root@${CRDB_ADDR}/${DB_NAME}"
      BIND_NATS_URL: "${NATS_URL}"
      BIND_NATS_CLUSTER_ID: "${NATS_CLUSTER_ID}"
      BIND_NATS_TASK_CLIENT_ID: "bind-service-a"
      BIND_NATS_TASK_MAIL_SEND_SUBJECT: "bind-send"
      BIND_NATS_TASK_MAIL_SAVE_SUBJECT: "bind-save"
      BIND_SESSION_HEDIS_HOST: "${REDIS_ADDR}"
      BIND_SESSION_HEDIS_PASSWORD: ""
      BIND_SESSION_HEDIS_DB: "1"
      BIND_SESSION_HEDIS_POOLSIZE: "10"
      BIND_CACHE_HEDIS_HOST: "${REDIS_ADDR}"
      BIND_CACHE_HEDIS_PASSWORD: ""
      BIND_CACHE_HEDIS_DB: "0"
      BIND_CACHE_HEDIS_POOLSIZE: "20"
      BIND_OSS_PUBLIC_ADDR: "${DOMAIN}"
      BIND_OSS_ADDR: "${MINIO_ADDR}"
      BIND_OSS_ACCESS_KEY: "${MINIO_USER}"
      BIND_OSS_ACCESS_SECRET: "${MINIO_PASSWORD}"
      BIND_OSS_USE_SSL: "${MINIO_USESSL}"
      BIND_OSS_MAIL_BUCKET_NAME: "${MAIL_BUCKET}"
      BIND_OSS_DRIVE_BUCKET_NAME: "${DRIVE_BUCKET}"

    depends_on:
      - search
      - minio
      - redis
      - nats

  imap:
    image: ${DOCKER_REGISTRY}bindoffice/bind-imap:latest
    command: ["/data/www/bind-imap/bind-imap"]
    restart: always
    tty: true
    volumes:
      - ./imap/logs:/data/www/logs
      - ./imap/certs:/tmp/bind_certs
    network_mode: "host"
    environment:
      BIND_IMAP_ADDR: "${IMAP_ADDR}"
      BIND_IMAP_TLS_ADDR: "${IMAP_TLS_ADDR}"
      BIND_SQLDB: "postgresql://root@${CRDB_ADDR}/${DB_NAME}"
      BIND_SESSION_HEDIS_HOST: "${REDIS_ADDR}"
      BIND_SESSION_HEDIS_PASSWORD: ""
      BIND_SESSION_HEDIS_DB: "1"
      BIND_SESSION_HEDIS_POOLSIZE: "10"
      BIND_SEARCH_SERVER: "http://${SEARCH_ADDR}"
    depends_on:
      - search
      - crdb
      - crdb-init

  nginx:   #nginx
    image: ${DOCKER_REGISTRY}bindoffice/nginx:1.22  #nginx镜像，如果镜像容器没有会去自动拉取
    container_name: bind_nginx       #容器的名称
    restart: always             #跟随docker的启动而启动
    volumes:                    #挂载卷命令
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/logs:/var/log/nginx/
      - ./nginx/conf.d/inbox.conf:/etc/nginx/conf.d/default.conf #映射配置文件
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - web
    network_mode: "host"

  
volumes:
    crdb:
    redis:
    conf:
    nginx:
    minio:
    office-api:
    meet-server:
    smtp:
    imap:

server {
    listen              443 ssl http2 default_server;
    listen              [::]:443 ssl http2;
    set                 $base /data/www/inbox;
    root                $base;

    # SSL
    ssl_certificate     /etc/nginx/certs/cert.crt;
    ssl_certificate_key /etc/nginx/certs/cert.key;

    # logging
    access_log          /var/log/nginx/inbox.access.log combined buffer=512k flush=1m;
    error_log           /var/log/nginx/inbox.error.log warn;

    # index.php
    index               index.html;


    location ^~ /oss {
	    proxy_http_version 1.1;
	    proxy_set_header Upgrade $http_upgrade;
	    proxy_set_header Connection "Upgrade";
        proxy_buffering on;                  # 启用缓冲（如需缓存必须开启）
        proxy_cache_valid 200 30d;
	    rewrite ^/oss/(.*)$ /$1 break;


		proxy_set_header Host $proxy_host;
		# Configure out caches
		proxy_cache S3-cache;
		proxy_buffers 8 16k;
		proxy_buffer_size 16k;
		proxy_busy_buffers_size 32k;

		# Do not convert HEAD into GET
		proxy_cache_convert_head off;       

		# Pass along Authorization credentials to upstream S3
		proxy_set_header Authorization $http_authorization;

		# proxy_cache_purge $purge_method;

		proxy_cache_bypass $http_cachepurge;

		slice 1m; # 每 1MB 切片缓存一次
		proxy_set_header Range $slice_range;
		# Since head conversion is disabled, the request_method is included in the proxy_cache_key
		proxy_cache_key  "$scheme$proxy_host$request_method$uri$is_args$args$slice_range"; # key里也要加上加上切片变量


		# GET and HEAD are cached by default
		proxy_cache_methods GET HEAD;

		#  Cache all 200 OK's for 24 hours
		proxy_cache_valid  200 24h;

		# Use stale cache file in all errors from upstream if we can
		proxy_cache_use_stale  error timeout updating http_500 http_502 http_503 http_504;

		#  Lock the cache so that only one request can populate it at a time
		proxy_cache_lock    on;
		proxy_cache_revalidate on;

		add_header             Cache-Control max-age=31536000;
		# Set back a nice HTTP Header to indicate what the cache status was
		add_header             X-Cache-Status $upstream_cache_status;

	    proxy_pass            http://minioserver;
    }


    location ^~ /rtc {
	    proxy_http_version 1.1;
	    proxy_set_header Upgrade $http_upgrade;
	    proxy_set_header Connection "Upgrade";
	    proxy_set_header Host $host;
        proxy_pass            http://meetserver/rtc;
    }


    location / {

	    proxy_http_version 1.1;
	    proxy_set_header Upgrade $http_upgrade;
	    proxy_set_header Connection "Upgrade";
	    proxy_set_header Host $host;
        proxy_pass       http://webserver;
    }


}


server {
    listen              41883 ssl http2 default_server;
    listen              [::]:41883 ssl http2;
    set                 $base /data/www/inbox;
    root                $base;

    # SSL
    ssl_certificate     /etc/nginx/certs/cert.crt;
    ssl_certificate_key /etc/nginx/certs/cert.key;

    # logging
    access_log          /var/log/nginx/mqtt.access.log combined buffer=512k flush=1m;
    error_log           /var/log/nginx/mqtt.error.log warn;

    # index.php
    index               index.html;


    location  / {
	    proxy_http_version 1.1;
	    proxy_set_header Upgrade $http_upgrade;
	    proxy_set_header Connection "Upgrade";
	    proxy_set_header Host $host;
	    proxy_buffering off;
	    proxy_pass            http://mqttserver;
    }
}


# HTTP redirect
server {
    listen      80 default_server;
    listen      [::]:80;
    set                 $base /data/www/inbox;
    root                $base;

    # logging
    access_log          /var/log/nginx/inbox.access.log combined buffer=512k flush=1m;
    error_log           /var/log/nginx/inbox.error.log warn;

    index               index.html;

    location ^~ /oss {
	    proxy_http_version 1.1;
	    proxy_set_header Upgrade $http_upgrade;
	    proxy_set_header Connection "Upgrade";
	    proxy_set_header Host $host;
	    proxy_buffering off;
	    rewrite ^/oss/(.*)$ /$1 break;
	    proxy_pass            http://minioserver;
    }


    location ^~ /rtc {
	    proxy_http_version 1.1;
	    proxy_set_header Upgrade $http_upgrade;
	    proxy_set_header Connection "Upgrade";
	    proxy_set_header Host $host;
	    proxy_pass            http://meetserver/rtc;
    }

    location / {

	    proxy_http_version 1.1;
	    proxy_set_header Host $host;
	    proxy_set_header X-Real-IP $remote_addr;
	    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	    proxy_set_header X-Forwarded-Proto $scheme;
	    proxy_set_header Upgrade $http_upgrade;
	    proxy_set_header Connection "Upgrade";
	    proxy_pass       http://webserver;
    }

    

}


